# go-call-graph 配置文件
# 复制为 go-call-graph.yaml 并按需修改
# CLI 参数优先级高于配置文件

# 目标 Go 项目目录
dir: "."

# Web 服务端口
port: 8080

# 开发模式（从文件系统加载前端资源）
dev: false

# 排除目录（相对于 dir，不分析这些目录下的 Go 文件）
exclude:
  - vendor
  - protocol
#   - third_party

# 调用图设置
callgraph:
  # 默认展开深度（前端请求不带 depth 参数时的后备值）
  default_depth: 2

# 默认静音规则
#
# 这些规则在启动时加载到前端，作为默认的 mute 规则显示在界面上。
# 用户可以在界面中添加/删除自己的规则，但这里的规则每次启动都会重新加载。
#
# 支持的规则类型：
#   - type: stdlib              静音所有标准库函数
#   - type: package             静音指定包路径下的所有函数
#     pattern: "pkg/path"
#   - type: func                静音指定函数
#     pattern: "pkg/path.FuncName"
#   - type: pattern             通配符模式匹配
#     pattern: "middleware.*"
mute:
  - type: stdlib
#   - type: package
#     pattern: "github.com/foo/bar"
#   - type: pattern
#     pattern: "internal/debug.*"
