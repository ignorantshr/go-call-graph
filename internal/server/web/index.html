<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go Call Graph</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Left Panel: Navigation -->
    <div id="left-panel">
      <div class="panel-tabs">
        <button class="tab active" data-tab="files">Files</button>
        <button class="tab" data-tab="bookmarks">Marks</button>
        <button class="tab" data-tab="muted">Muted</button>
      </div>
      <div class="panel-search">
        <input type="text" id="search-input" placeholder="Search functions, files...">
      </div>
      <div class="tab-content active" id="tab-files">
        <div id="file-tree"></div>
      </div>
      <div class="tab-content" id="tab-bookmarks">
        <div class="tab-actions">
          <button id="bookmark-chain-btn" class="small-btn" title="Show only paths between bookmarks">Chain Mode</button>
        </div>
        <div id="bookmark-list"></div>
      </div>
      <div class="tab-content" id="tab-muted">
        <div class="tab-actions">
          <button id="add-mute-btn" class="small-btn">+ Add Rule</button>
        </div>
        <div id="muted-list"></div>
      </div>
    </div>

    <!-- Center Panel: Call Graph -->
    <div id="center-panel">
      <button id="toggle-left" class="panel-toggle panel-toggle-left" title="Toggle left panel">◀</button>
      <button id="toggle-right" class="panel-toggle panel-toggle-right" title="Toggle right panel">▶</button>
      <div id="graph-toolbar">
        <!-- View -->
        <div class="toolbar-group">
          <button id="fit-btn" class="toolbar-btn" title="Fit to view">Fit</button>
          <span id="zoom-level" class="toolbar-value">100%</span>
          <button id="chain-reset-btn" class="toolbar-btn" title="Clear canvas">Clear</button>
        </div>
        <span class="toolbar-sep"></span>
        <!-- Depth -->
        <div class="toolbar-group">
          <span class="toolbar-label">Depth</span>
          <input id="chain-depth" type="number" min="0" max="10" value="0" class="toolbar-input" title="0 = manual mode, 1+ = auto expand depth">
          <button id="keep-view-btn" class="toolbar-btn" title="Keep current view when depth decreases">Pin</button>
        </div>
        <span class="toolbar-sep"></span>
        <!-- Views -->
        <div class="toolbar-group">
          <button id="chain-save-btn" class="toolbar-btn" title="Save current canvas view">Save</button>
          <select id="chain-views-select" class="toolbar-select" title="Load saved view">
            <option value="">Views</option>
          </select>
        </div>
        <span class="toolbar-sep"></span>
        <!-- Settings -->
        <div class="toolbar-group" style="position:relative">
          <button id="settings-btn" class="toolbar-btn" title="Settings">&#9881;</button>
          <div id="settings-panel" class="hidden">
            <div class="settings-row">
              <span class="settings-label">Word wrap</span>
              <button id="chain-wrap-btn" class="toolbar-btn" title="Toggle word wrap">Off</button>
            </div>
            <div class="settings-row">
              <span class="settings-label">Font size</span>
              <input id="font-size-input" type="number" min="8" max="20" value="12" class="toolbar-input" title="Code font size (px)">
            </div>
            <div class="settings-row">
              <span class="settings-label">Theme</span>
              <select id="theme-select" class="toolbar-select" title="Color theme"></select>
            </div>
          </div>
        </div>
      </div>
      <div id="chain-container">
        <svg id="chain-svg">
          <defs>
            <marker id="arrow-chain" viewBox="0 0 10 10" refX="10" refY="5"
                    markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M 0 1 L 10 5 L 0 9 z" fill="#56d364"/>
            </marker>
          </defs>
        </svg>
        <div id="chain-canvas"></div>
        <div id="chain-empty-hint">Click a function to load its call chain</div>
      </div>
    </div>

    <!-- Resize Handle -->
    <div id="resize-handle"></div>

    <!-- Right Panel: Code + Info -->
    <div id="right-panel">
      <div class="right-tabs">
        <button class="rtab active" data-rtab="code">Code</button>
        <button class="rtab" data-rtab="info">Info</button>
      </div>
      <div class="rtab-content active" id="rtab-code">
        <div id="code-header">
          <div class="code-header-row">
            <button id="nav-back" class="nav-btn" title="Back" disabled>&larr;</button>
            <button id="nav-forward" class="nav-btn" title="Forward" disabled>&rarr;</button>
            <span id="current-file-path">Click a node to view code</span>
          </div>
          <div class="code-header-row">
            <div id="code-search-bar">
              <input type="text" id="code-search-input" placeholder="Find in file..." />
              <span id="code-search-count"></span>
            </div>
            <button id="locate-toggle" class="toolbar-btn" title="Locate mode">Locate</button>
            <button id="wrap-toggle" class="toolbar-btn" title="Toggle word wrap">Wrap</button>
            <button id="outline-toggle" class="toolbar-btn" title="Toggle outline">Outline</button>
          </div>
        </div>
        <div id="code-body">
          <div id="code-view"></div>
          <div id="code-outline" class="hidden"></div>
        </div>
      </div>
      <div class="rtab-content" id="rtab-info">
        <div id="info-header">
          <h3 id="info-func-name">No function selected</h3>
        </div>
        <div id="info-details">
          <div id="info-signature" class="info-section"></div>
          <div id="info-doc" class="info-section"></div>
          <div id="info-meta" class="info-section"></div>
          <div id="info-callers" class="info-section">
            <h4>Callers</h4>
            <ul id="callers-list"></ul>
          </div>
          <div id="info-callees" class="info-section">
            <h4>Callees</h4>
            <ul id="callees-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Search results dropdown -->
  <div id="search-results" class="hidden"></div>

  <!-- Context menu -->
  <div id="context-menu" class="hidden">
    <div class="ctx-item" data-action="mute-func">Mute this function</div>
    <div class="ctx-item" data-action="mute-pkg">Mute entire package</div>
    <div class="ctx-item" data-action="bookmark">Toggle bookmark</div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="hidden"></div>

  <script src="dagre.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
