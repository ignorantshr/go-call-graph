name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-X main.version=${VERSION}"

          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/go-call-graph-linux-amd64       ./cmd/main.go
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/go-call-graph-linux-arm64       ./cmd/main.go
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/go-call-graph-darwin-amd64      ./cmd/main.go
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/go-call-graph-darwin-arm64      ./cmd/main.go
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/go-call-graph-windows-amd64.exe ./cmd/main.go

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
